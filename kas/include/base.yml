header:
  version: 20

distro: "yoe"

defaults:
  repos:
    branch: master

env:
  IMG_VERSION: "26.04.0"

repos:
  meta-yoe:
    path: sources/meta-yoe
    layers:
      .:
  openembedded-core:
    url: https://github.com/YoeDistro/openembedded-core
    path: layers/openembedded-core
    layers:
      meta:

  bitbake:
    url: https://github.com/YoeDistro/bitbake
    path: layers/bitbake
    layers:
      bitbake: disabled

  meta-openembedded:
    url: https://github.com/YoeDistro/meta-openembedded
    path: layers/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:
      meta-perl:
      meta-gnome:
      meta-initramfs:
      meta-webserver:
      meta-xfce:

  meta-qt6:
    url: https://github.com/YoeDistro/meta-qt6
    branch: '6.11'
    path: layers/meta-qt6

  meta-clang:
    url: https://github.com/YoeDistro/meta-clang
    path: layers/meta-clang
