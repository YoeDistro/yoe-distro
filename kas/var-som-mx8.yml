header:
  version: 20
  includes:
    - kas/include/base.yml
    - kas/include/yoe-updater.yml

machine: imx8qm-var-som

target:
  - yoe-installer-image
  - yoe-kiosk-image

repos:

  meta-variscite-bsp:
    url: https://github.com/YoeDistro/meta-variscite-bsp
    path: layers/meta-variscite-bsp
    branch: yoe/scarthgap_6.6.52-2.2.0_var01

  meta-variscite-bsp-common:
    url: https://github.com/YoeDistro/meta-variscite-bsp-common
    path: layers/meta-variscite-bsp-common
    branch: yoe/scarthgap_6.6.52-2.2.0_var01

  meta-security:
    url: https://github.com/YoeDistro/meta-security
    path: layers/meta-security
    layers:
      .:
      meta-tpm:

  meta-freescale:
    url: https://github.com/YoeDistro/meta-freescale
    path: layers/meta-freescale

local_conf_header:

  MACHINE description: |
    # Variscite SOM based on i.MX 8 QuadMax/QuadPlus

  Freescale stuff EULA: |
    ACCEPT_FSL_EULA = "1"

  yoe-<libc>-<init-system>-<windowing-system>: |
    YOE_PROFILE = "yoe-glibc-systemd-wayland"

  image file systems: |
    IMAGE_FSTYPES:append = " wic.xz wic.bmap ext4.xz"
    IMAGE_FSTYPES:remove = "ext4 tar.gz wic.bz2"

  Use default Device Tree ( LVDS ): |
    IMAGE_BOOT_FILES:append = " imx8qm-var-som-symphony-lvds.dtb;imx8qm-var-som-symphony.dtb"

  HDMI firmware: |
    IMAGE_BOOT_FILES:append = " hdmitxfw.bin hdmirxfw.bin dpfw.bin tee.bin imx-boot"

  Yoe updater configuration (in addition to kas/include/yoe-updater.yml): |
    WKS_FILE:yoe = "yoe-imx8-sdimage.wks.in"
    WKS_FILE:yoe:pn-yoe-installer-image = "yoe-imx8-sd-installer.wks.in"

  Needed for logic in Variscite wifi bringup script: |
    PREFERRED_VERSION_libgpiod = "1.%"

  Enable optee see https://variwiki.com/index.php?title=IMX8_OPTEE&release=mx8mp-yocto-mickledore-6.1.36_2.1.0-v1.2: |
    MACHINE_FEATURES:append = " optee"
    DISTRO_FEATURES:append = " optee"
    IMAGE_INSTALL:append = " optee-os"

  Enable fortran: |
    FORTRAN = ",fortran"
    RUNTIMETARGET:append:pn-gcc-runtime = " libquadmath "
    TOOLCHAIN_TARGET_TASK:append = " gfortran"

  Needed for Running bitbake -ctestimage <image>: |
    TEST_TARGET_IP = "${MACHINE}@local"
    TEST_SERVER_IP = "10.0.0.10"
    TEST_TARGET = "simpleremote"
